name: Sync upstream and release

on:
  schedule:
    # 每 2 小时检查一次
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Check upstream latest release
      id: check
      run: |
        # 获取上游最新 release（含 prerelease）完整信息
        UPSTREAM_RELEASE=$(curl -s https://api.github.com/repos/2dust/v2rayNg/releases | jq '.[0]')
        UPSTREAM_TAG=$(echo "$UPSTREAM_RELEASE" | jq -r '.tag_name')
        echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
        echo "上游最新版（含 prerelease）: $UPSTREAM_TAG"

        if [ "$UPSTREAM_TAG" == "null" ] || [ -z "$UPSTREAM_TAG" ]; then
          echo "无法获取上游 release 信息"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        # 提取 release body 和 prerelease 状态
        UPSTREAM_BODY=$(echo "$UPSTREAM_RELEASE" | jq -r '.body // ""')
        UPSTREAM_PRERELEASE=$(echo "$UPSTREAM_RELEASE" | jq -r '.prerelease')
        echo "upstream_prerelease=$UPSTREAM_PRERELEASE" >> $GITHUB_OUTPUT

        # body 可能含多行，用文件传递
        echo "$UPSTREAM_BODY" > /tmp/release_body.txt
        echo "上游 prerelease: $UPSTREAM_PRERELEASE"

        # 检查 mod 仓库是否已有该版本的 release
        MOD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/$UPSTREAM_TAG")

        if [ "$MOD_STATUS" == "200" ]; then
          echo "Mod 仓库已有 $UPSTREAM_TAG release，跳过"
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "发现新版本 $UPSTREAM_TAG，开始同步"
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Checkout mod repo
      if: steps.check.outputs.skip != 'true'
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync upstream code
      if: steps.check.outputs.skip != 'true'
      run: |
        UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"

        # 备份 mod 仓库的 .github 目录（避免被上游覆盖）
        cp -r .github /tmp/.github-backup

        # 添加上游 remote
        git remote add upstream https://github.com/2dust/v2rayNg.git || true
        git fetch upstream --tags --force

        # 配置 git
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # reset 到上游 tag 对应的 commit
        git reset --hard "$UPSTREAM_TAG"

        # 恢复 mod 仓库的 .github 目录
        rm -rf .github
        cp -r /tmp/.github-backup .github
        echo "✅ 已恢复 mod 仓库的 .github 目录"

    - name: Remove promotion
      if: steps.check.outputs.skip != 'true'
      run: |
        python3 << 'PYTHON_SCRIPT'
        import os
        import re

        def remove_menu_item(xml_content, item_id):
            """移除指定 id 的菜单项，支持自闭合标签和普通标签"""
            # 匹配普通闭合标签: <item ...>...</item>
            pattern1 = rf'<item\s+android:id="@\+id/{item_id}"[^>]*>.*?</item>\s*(?=\n\s*</menu>)'
            # 匹配自闭合标签: <item ... />
            pattern2 = rf'<item\s+android:id="@\+id/{item_id}"[^>]*/>\s*(?=\n\s*</?item)'
            result = re.sub(pattern1, '', xml_content, flags=re.DOTALL)
            result = re.sub(pattern2, '', result, flags=re.DOTALL)
            return result

        def replace_in_file(file_path, old_text, new_text):
            """替换文件中的文本"""
            if not os.path.exists(file_path):
                print(f"⚠️ 文件不存在，跳过: {file_path}")
                return False
            with open(file_path, 'r', encoding='utf-8') as f:
                content = f.read()
            if old_text in content:
                content = content.replace(old_text, new_text)
                with open(file_path, 'w', encoding='utf-8') as f:
                    f.write(content)
                print(f"✅ 已替换: {file_path}")
                return True
            else:
                print(f"⚠️ 未找到目标文本: {file_path}")
                return False

        # 1. 移除菜单项
        menu_file = 'V2rayNG/app/src/main/res/menu/menu_drawer.xml'
        if os.path.exists(menu_file):
            with open(menu_file, 'r', encoding='utf-8') as f:
                content = f.read()
            content = remove_menu_item(content, 'promotion')
            with open(menu_file, 'w', encoding='utf-8') as f:
                f.write(content)
            print(f"✅ 已移除 promotion 菜单项: {menu_file}")

        # 2. 移除 MainActivity.kt 中的 promotion 调用
        main_activity = 'V2rayNG/app/src/main/java/com/v2ray/ang/ui/MainActivity.kt'
        if os.path.exists(main_activity):
            with open(main_activity, 'r', encoding='utf-8') as f:
                content = f.read()
            # 移除 R.id.promotion 的 case 分支
            pattern = r'\n\s*R\.id\.promotion\s*->.*?(?=\n\s*R\.id\.)'
            new_content = re.sub(pattern, '', content, flags=re.DOTALL)
            if new_content != content:
                with open(main_activity, 'w', encoding='utf-8') as f:
                    f.write(new_content)
                print(f"✅ 已移除 MainActivity.kt 中的 promotion 调用")

        # 3. 移除 AppConfig.kt 中的 APP_PROMOTION_URL
        replace_in_file('V2rayNG/app/src/main/java/com/v2ray/ang/AppConfig.kt',
                        '2dust/v2rayNG', '91fabu/v2rayNG-noAD')

        PYTHON_SCRIPT

    - name: Commit and push
      if: steps.check.outputs.skip != 'true'
      run: |
        UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"

        git add -A
        git commit -m "Sync upstream $UPSTREAM_TAG - Remove promotion"
        git push --force origin master

        # 创建对应的 tag
        git tag -f "$UPSTREAM_TAG"
        git push --force origin "$UPSTREAM_TAG"

    - name: Create release with upstream info
      if: steps.check.outputs.skip != 'true'
      run: |
        UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
        UPSTREAM_PRERELEASE="${{ steps.check.outputs.upstream_prerelease }}"

        # 用 Python heredoc 构造 JSON 避免转义问题
        export UPSTREAM_TAG UPSTREAM_PRERELEASE
        python3 << 'PYEOF'
        import json, os

        upstream_body = open('/tmp/release_body.txt').read().strip()

        body = upstream_body

        payload = {
            'tag_name': os.environ['UPSTREAM_TAG'],
            'target_commitish': 'master',
            'name': '',
            'body': body,
            'draft': False,
            'prerelease': os.environ['UPSTREAM_PRERELEASE'] == 'true'
        }
        with open('/tmp/release_payload.json', 'w') as f:
            json.dump(payload, f)
        PYEOF

        echo "预创建 release $UPSTREAM_TAG (prerelease=$UPSTREAM_PRERELEASE)"
        curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases" \
          -d @/tmp/release_payload.json

        echo "✅ Release 已创建，信息与上游一致"

    - name: Trigger build-all workflow
      if: steps.check.outputs.skip != 'true'
      run: |
        UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
        echo "触发 build.yml，release_tag=$UPSTREAM_TAG"
        curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
          -d '{"ref":"master","inputs":{"release_tag":"'"$UPSTREAM_TAG"'"}}'
        echo "✅ 构建已触发，版本: $UPSTREAM_TAG"
